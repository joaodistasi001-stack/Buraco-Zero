<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buraco Zero App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}

/* LOGIN AZUL */
#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
background:linear-gradient(135deg,#2980b9,#6dd5fa);
color:white;
}

#login input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

#sistema{display:none;padding:10px;background:#ecf0f1;}

#map{height:300px;margin-top:10px;}

button{
width:100%;
padding:10px;
margin-top:5px;
background:#27ae60;
color:#fff;
border:none;
border-radius:5px;
font-weight:bold;
}

input, select{
padding:10px;
margin:5px 0;
width:100%;
border-radius:5px;
border:1px solid #ccc;
}

.item{
background:#fff;
margin:10px 0;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<img src="logo.png" width="120">
<h2>BURACO ZERO</h2>
<input placeholder="Usuário">
<input type="password" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="sistema">

<h3>Registrar Buraco</h3>

<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">

<button onclick="buscarEndereco()">Buscar endereço</button>
<button onclick="usarLocalizacao()">Usar minha localização 📍</button>

<div id="map"></div>

<!-- FOTO -->
<label>Foto do buraco:</label>
<input type="file" id="foto">

<!-- GRAVIDADE -->
<label>Gravidade:</label>
<select id="gravidade">
<option value="Leve">Leve</option>
<option value="Médio">Médio</option>
<option value="Grave">Grave</option>
</select>

<button onclick="registrar()">Registrar Buraco</button>

<h3>Ocorrências (<span id="contador">0</span>)</h3>
<div id="lista"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;
let marcadorAtual;
let ocorrencias = [];
let coordenadaAtual = null;

function entrar(){
document.getElementById("login").style.display="none";
document.getElementById("sistema").style.display="block";

map = L.map('map');

navigator.geolocation.getCurrentPosition(pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    map.setView([lat, lon], 16);

    L.marker([lat, lon]).addTo(map)
        .bindPopup("Você está aqui")
        .openPopup();

}, () => {
    // se não permitir GPS, volta para São Paulo
    map.setView([-23.55,-46.63],13);
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

map.on("click", function(e){
coordenadaAtual = e.latlng;

if(marcadorAtual){
map.removeLayer(marcadorAtual);
}

marcadorAtual = L.marker(e.latlng).addTo(map)
.bindPopup("Local selecionado")
.openPopup();
});
}

// 🔍 BUSCAR ENDEREÇO (COM CAMPOS SEPARADOS)
function buscarEndereco(){

let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let bairro = document.getElementById("bairro").value;
let cidade = document.getElementById("cidade").value;

let endereco = `${rua}, ${numero}, ${bairro}, ${cidade}`;

fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${endereco}`)
.then(res => res.json())
.then(data => {
if(data.length > 0){

let lat = data[0].lat;
let lon = data[0].lon;

coordenadaAtual = {lat:parseFloat(lat), lng:parseFloat(lon)};

map.setView([lat, lon], 17);

if(marcadorAtual){
map.removeLayer(marcadorAtual);
}

marcadorAtual = L.marker([lat, lon]).addTo(map)
.bindPopup("Endereço encontrado")
.openPopup();

}else{
alert("Endereço não encontrado");
}
})
.catch(()=>alert("Erro ao buscar endereço"));
}

// 📍 LOCALIZAÇÃO
function usarLocalizacao(){
navigator.geolocation.getCurrentPosition(pos=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

coordenadaAtual = {lat, lng:lon};

map.setView([lat, lon], 17);

if(marcadorAtual){
map.removeLayer(marcadorAtual);
}

marcadorAtual = L.marker([lat, lon]).addTo(map)
.bindPopup("Sua localização")
.openPopup();

});
}

// 📸 REGISTRAR
function registrar(){

if(!coordenadaAtual){
alert("Selecione um local!");
return;
}

let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let bairro = document.getElementById("bairro").value;
let cidade = document.getElementById("cidade").value;

let endereco = `${rua}, ${numero}, ${bairro}, ${cidade}`;

let gravidade = document.getElementById("gravidade").value;

let file = document.getElementById("foto").files[0];
let fotoURL = file ? URL.createObjectURL(file) : "";

let marcador = L.circleMarker([coordenadaAtual.lat, coordenadaAtual.lng],{
color:"red"
}).addTo(map);

ocorrencias.push({
endereco,
gravidade,
status:"Pendente",
foto:fotoURL,
marcador
});

atualizar();
}

// 🔄 ATUALIZAR
function atualizar(){

let lista = document.getElementById("lista");
lista.innerHTML="";

document.getElementById("contador").innerText = ocorrencias.length;

ocorrencias.forEach((o,i)=>{
lista.innerHTML += `
<div class="item">
<b>${o.endereco}</b><br>
Gravidade: ${o.gravidade}<br>
Status: ${o.status}<br>
${o.foto ? `<img src="${o.foto}" width="100">` : ""}
<button onclick="resolver(${i})">Resolvido</button>
</div>
`;
});
}

// ✅ RESOLVER
function resolver(i){
ocorrencias[i].status="Resolvido";
ocorrencias[i].marcador.setStyle({color:"blue"});
atualizar();
}
</script>

</body>
</html>
