<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buraco Zero App</title>

<!-- WHATSAPP -->
<meta property="og:title" content="Buraco Zero">
<meta property="og:description" content="Registre buracos na sua cidade de forma rápida">
<meta property="og:image" content="https://joaodistas001-stack.github.io/Buraco-Zero/logo.png">
<meta property="og:url" content="https://joaodistas001-stack.github.io/Buraco-Zero/">
<meta name="twitter:card" content="summary_large_image">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
background:linear-gradient(135deg,#2980b9,#6dd5fa);
color:white;
}

#login input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

#sistema{display:none;padding:10px;background:#ecf0f1;}

#map{height:300px;margin-top:10px;}

button{
width:100%;
padding:10px;
margin-top:5px;
background:#27ae60;
color:#fff;
border:none;
border-radius:5px;
font-weight:bold;
}

.criar{
background:#2980b9;
}

input, select{
padding:10px;
margin:5px 0;
width:100%;
border-radius:5px;
border:1px solid #ccc;
}

.item{
background:#fff;
margin:10px 0;
padding:10px;
border-radius:8px;
}

#loading{
display:none;
text-align:center;
font-weight:bold;
color:#2980b9;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<img src="logo.png" width="120">
<h2>BURACO ZERO</h2>

<input placeholder="Usuário">
<input type="password" placeholder="Senha">

<button onclick="entrar()">Entrar</button>
<button class="criar" onclick="alert('Funcionalidade ilustrativa')">Criar login</button>
</div>

<!-- SISTEMA -->
<div id="sistema">

<h3>Registrar Buraco</h3>

<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">

<button onclick="buscarEndereco()">Buscar endereço</button>
<button onclick="usarLocalizacao()">Usar minha localização 📍</button>

<div id="loading">Buscando endereço...</div>

<div id="map"></div>

<label>Foto do buraco:</label>
<input type="file" id="foto">

<label>Gravidade:</label>
<select id="gravidade">
<option value="Leve">Leve</option>
<option value="Médio">Médio</option>
<option value="Grave">Grave</option>
</select>

<button onclick="registrar()">Registrar Buraco</button>

<h3>Ocorrências (<span id="contador">0</span>)</h3>
<div id="lista"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let marcadorAtual;
let ocorrencias = [];
let coordenadaAtual = null;

function entrar(){

document.getElementById("login").style.display="none";
document.getElementById("sistema").style.display="block";

map = L.map('map');

navigator.geolocation.getCurrentPosition(pos => {

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

map.setView([lat, lon], 16);

L.marker([lat, lon]).addTo(map)
.bindPopup("Você está aqui")
.openPopup();

}, () => {
map.setView([-23.55,-46.63],13);
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

map.on("click", function(e){

coordenadaAtual = e.latlng;

if(marcadorAtual){
map.removeLayer(marcadorAtual);
}

marcadorAtual = L.marker(e.latlng).addTo(map)
.bindPopup("Local selecionado")
.openPopup();

});
}

// 🔥 BUSCA CORRIGIDA + MELHORADA
function buscarEndereco(){

let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let bairro = document.getElementById("bairro").value;
let cidade = document.getElementById("cidade").value;

if (!rua || !cidade){
alert("Preencha rua e cidade");
return;
}

document.getElementById("loading").style.display = "block";

// 🔥 endereço mais inteligente
let endereco = `${rua}, ${cidade}`;

fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`)
.then(res => res.json())
.then(data => {

document.getElementById("loading").style.display = "none";

if(data.length > 0){

let lat = parseFloat(data[0].lat);
let lon = parseFloat(data[0].lon);

coordenadaAtual = {lat, lng:lon};

map.setView([lat, lon], 17);

if(marcadorAtual){
map.removeLayer(marcadorAtual);
}

marcadorAtual = L.marker([lat, lon]).addTo(map)
.bindPopup("Endereço encontrado")
.openPopup();

}else{
alert("Endereço não encontrado. Tente apenas rua + cidade.");
}

})
.catch(()=>{
document.getElementById("loading").style.display = "none";
alert("Erro ao buscar endereço");
});
}

// 📍 LOCALIZAÇÃO
function usarLocalizacao(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

coordenadaAtual = {lat, lng:lon};

map.setView([lat, lon], 17);

if(marcadorAtual){
map.removeLayer(marcadorAtual);
}

marcadorAtual = L.marker([lat, lon]).addTo(map)
.bindPopup("Sua localização")
.openPopup();

});
}

// 📸 REGISTRAR
function registrar(){

if(!coordenadaAtual){
alert("Selecione um local!");
return;
}

let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let bairro = document.getElementById("bairro").value;
let cidade = document.getElementById("cidade").value;

let endereco = `${rua}, ${numero}, ${bairro}, ${cidade}`;
let gravidade = document.getElementById("gravidade").value;

let file = document.getElementById("foto").files[0];
let fotoURL = file ? URL.createObjectURL(file) : "";

// CORES
let cor = "green";
if(gravidade === "Médio") cor = "orange";
if(gravidade === "Grave") cor = "red";

let marcador = L.circleMarker([coordenadaAtual.lat, coordenadaAtual.lng],{
color:cor
}).addTo(map);

ocorrencias.push({
endereco,
gravidade,
status:"Pendente",
foto:fotoURL,
marcador
});

atualizar();
}

// 🔄 ATUALIZAR
function atualizar(){

let lista = document.getElementById("lista");
lista.innerHTML="";

document.getElementById("contador").innerText = ocorrencias.length;

ocorrencias.forEach((o,i)=>{

lista.innerHTML += `
<div class="item">
<b>${o.endereco}</b><br>
Gravidade: ${o.gravidade}<br>
Status: ${o.status}<br>
${o.foto ? `<img src="${o.foto}" width="100">` : ""}
<a href="https://www.google.com/maps?q=${o.endereco}" target="_blank">
<button>Ver no mapa</button>
</a>
<button onclick="resolver(${i})">Resolvido</button>
</div>
`;

});
}

// ✅ RESOLVER
function resolver(i){
ocorrencias[i].status="Resolvido";
ocorrencias[i].marcador.setStyle({color:"blue"});
atualizar();
}

</script>

</body>
</html>
